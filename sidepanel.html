<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DesignPrompt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
  <style>
    html { width: 100% !important; }
    .app { width: 100%; max-height: 100vh; }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <img src="icons/logo-light.png" alt="vibedesign" class="logo-img" />
    </div>
    <div class="header-right">
      <span class="version-badge" id="versionBadge"></span>
      <span class="mode-badge mode-badge--fallback" id="modeBadge">Rule-based</span>
      <button class="icon-btn" id="historyToggle" title="Saved prompts">◷</button>
      <button class="icon-btn" id="settingsToggle" title="API Settings">⚙</button>
    </div>
  </header>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">AI Provider</div>
    <div class="provider-tabs" id="providerTabs">
      <button class="provider-tab active" data-provider="gemini">
        <span class="provider-dot" style="background:#4285f4"></span>Gemini
      </button>
      <button class="provider-tab" data-provider="claude">
        <span class="provider-dot" style="background:#d97706"></span>Claude
      </button>
      <button class="provider-tab" data-provider="openai">
        <span class="provider-dot" style="background:#10a37f"></span>OpenAI
      </button>
      <button class="provider-tab" data-provider="none">
        <span class="provider-dot" style="background:#555"></span>None
      </button>
    </div>
    <div class="provider-info" id="providerInfo"></div>
    <div class="model-row" id="modelRow" style="display:none"></div>
    <div class="api-key-row" id="apiKeyRow">
      <input type="password" id="apiKeyInput" class="input" placeholder="API key..." />
      <button class="btn btn-sm" id="saveApiKey">Save</button>
    </div>
    <div class="settings-note" id="settingsNote"></div>
  </div>

  <!-- History Panel -->
  <div class="history-panel" id="historyPanel" style="display:none">
    <div class="history-header">
      <span class="settings-title">Saved Prompts</span>
      <button class="btn btn-sm btn-ghost danger-btn" id="clearHistoryBtn">Clear all</button>
    </div>
    <div class="history-list" id="historyList">
      <p class="empty-state">No saved prompts yet.</p>
    </div>
  </div>

  <!-- Controls -->
  <div class="mode-section">
    <div class="focus-row" id="focusRow">
      <span class="field-label">Focus</span>
      <div class="focus-chips">
        <button class="chip active" data-focus="all">All</button>
        <button class="chip" data-focus="colors">Colors</button>
        <button class="chip" data-focus="typography">Type</button>
        <button class="chip" data-focus="shadows">Shadow</button>
        <button class="chip" data-focus="motion">Motion</button>
        <button class="chip" data-focus="layout">Layout</button>
        <button class="chip" data-focus="components">Components</button>
      </div>
    </div>

    <!-- Content source (hidden textarea kept for JS compat) -->
    <textarea id="customContentInput" class="custom-content-input" style="display:none"></textarea>
  </div>

  <!-- Action -->
  <div class="action-section">
    <button class="btn btn-primary btn-full" id="analyzeBtn">
      <span id="analyzeBtnIcon">◫</span>
      <span id="analyzeBtnText">Analyze Page</span>
    </button>
  </div>

  <!-- Result -->
  <div class="result-section" id="resultSection" style="display:none">
    <!-- Restored session banner — shown when prompt is auto-restored on open -->
    <div class="restored-banner" id="restoredBanner" style="display:none">
      <span class="restored-icon">⟳</span>
      <span class="restored-text">Restored from last session</span>
      <button class="btn btn-sm btn-primary" id="newPromptBtn">New prompt</button>
    </div>
    <div class="result-header">
      <div class="result-meta" id="resultMeta"></div>
      <div class="result-actions">
        <button class="btn btn-sm btn-ghost" id="copyBtn"><span id="copyIcon">⎘</span> Copy</button>
        <button class="btn btn-sm btn-ghost" id="resetBtn">↺</button>
      </div>
    </div>
    <div class="save-indicator" id="saveIndicator" style="display:none">
      <span class="save-dot">●</span> Auto-saved
    </div>
    <div class="output-tabs" id="outputTabs" style="display:none">
      <button class="output-tab active" data-output="full">Full Page</button>
      <button class="output-tab" data-output="system">Global Tokens</button>
    </div>
    <div class="prompt-container">
      <pre class="prompt-output" id="promptOutput"></pre>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-section" id="loadingSection" style="display:none">
    <div class="loading-animation">
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
      <div class="loading-bar"></div>
    </div>
    <p class="loading-text" id="loadingText">Analyzing…</p>
  </div>

  <!-- Error -->
  <div class="error-section" id="errorSection" style="display:none">
    <span class="error-icon">⚠</span>
    <p class="error-text" id="errorText"></p>
    <button class="btn btn-sm" id="errorRetryBtn">Retry</button>
  </div>

</div>
<script src="lib/prompt-builder.js"></script>
<script src="lib/ai-caller.js"></script>
<script src="sidepanel.js"></script>
</body>
</html>
